name: Update Major Version Tag

# Builds and commits dist/action onto the version tag, then updates the
# matching major tag (v0 / v1 / ...). Triggers on either a published
# GitHub release (upstream's release flow) or a pushed `v*` tag (used by
# this fork, which doesn't run a release-create step). Either trigger
# converges on the same tag name via GITHUB_REF_NAME.
on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  update-tag:
    runs-on: ubuntu-latest
    # Skip re-runs caused by this workflow force-pushing the same tag with
    # the bundle commit on top. The commit subject is set by the
    # "Commit bundle and update tags" step.
    if: ${{ github.event_name == 'release' || !startsWith(github.event.head_commit.message, 'Build dist/action for ') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure source release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_TAG="v${VERSION}-src"
          ARTIFACT_SUBJECT="Build dist/action for $GITHUB_REF_NAME"
          SOURCE_SHA="$(git rev-parse HEAD)"

          while [ "$(git show -s --format=%s "$SOURCE_SHA")" = "$ARTIFACT_SUBJECT" ]; do
            SOURCE_SHA="$(git rev-parse "$SOURCE_SHA^")"
            echo "Detected existing artifact commit. Walking back to $SOURCE_SHA for $SOURCE_TAG"
          done

          if git rev-parse "$SOURCE_TAG^{commit}" >/dev/null 2>&1; then
            EXISTING_SHA="$(git rev-parse "$SOURCE_TAG^{commit}")"
            if [ "$EXISTING_SHA" = "$SOURCE_SHA" ]; then
              echo "Source tag $SOURCE_TAG already points to $SOURCE_SHA"
              exit 0
            fi

            echo "::error::Source tag $SOURCE_TAG points to $EXISTING_SHA, expected $SOURCE_SHA"
            exit 1
          fi

          echo "Creating source tag $SOURCE_TAG on $SOURCE_SHA"
          git tag "$SOURCE_TAG" "$SOURCE_SHA"
          git push origin "refs/tags/$SOURCE_TAG"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build action bundle
        run: pnpm build:action

      - name: Commit bundle and update tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="v${VERSION%%.*}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the bundle files needed by the action
          git add -f dist/action/index.js dist/action/licenses.txt dist/action/package.json
          # Add chunk and asset files if ncc produced any
          git add -f dist/action/*.index.js dist/action/*.wasm 2>/dev/null || true

          # Skip commit if bundle is already present (idempotent re-runs)
          git diff --cached --quiet || git commit -m "Build dist/action for $GITHUB_REF_NAME"

          # Update version tag to include the bundle
          git tag -fa "$GITHUB_REF_NAME" -m "Release $GITHUB_REF_NAME"
          git push -f origin "$GITHUB_REF_NAME"

          # Update major version tag
          git tag -fa "$MAJOR" -m "Update $MAJOR to $GITHUB_REF_NAME"
          git push -f origin "$MAJOR"
